<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Withdraw — SecureBank</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    body { background-color: #f7f8fa; }
    .brand-name { font-weight: 700; letter-spacing: .05em; }
  </style>
</head>
<body>

  <!-- Navigation bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand brand-name" href="/dashboard">🏦 SecureBank</a>
      <div class="ms-auto">
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-9 col-md-6 col-lg-5">

        <!-- Page heading -->
        <h2 class="mb-1">Withdraw Funds</h2>
        <p class="text-muted small mb-4">Take money from your account.</p>

        <!-- Current balance context -->
        <div class="alert alert-info py-2 small mb-4">
          Available balance: <strong>${{ "%.2f"|format(balance) }}</strong>
        </div>

        <!-- Error alert -->
        {% if error %}
        <div class="alert alert-danger py-2 small" role="alert">
          {{ error }}
        </div>
        {% endif %}

        <!-- Withdraw form -->
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <form action="/withdraw" method="POST" novalidate>
              <div class="mb-4">
                <label for="amount" class="form-label">Amount to Withdraw ($)</label>
                <input
                  type="number"
                  id="amount"
                  name="amount"
                  class="form-control form-control-lg"
                  placeholder="0.00"
                  min="0.01"
                  step="0.01"
                  max="{{ "%.2f"|format(balance) }}"
                  required
                  autofocus
                />
                <div class="form-text">Maximum: ${{ "%.2f"|format(balance) }}</div>
              </div>
              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-warning btn-lg">Confirm Withdrawal</button>
              </div>
            </form>
            <div class="text-center">
              <a href="/dashboard" class="text-muted small">← Back to Dashboard</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
