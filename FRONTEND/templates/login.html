<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SecureBank</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    body { background-color: #f7f8fa; }
    .brand-header { font-weight: 700; letter-spacing: .05em; color: #3b82d4; }
  </style>
</head>
<body class="d-flex align-items-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-8 col-md-5 col-lg-4">

        <!-- Bank brand -->
        <div class="text-center mb-4">
          <h1 class="brand-header fs-3">🏦 SecureBank</h1>
          <p class="text-muted small">Customer Online Portal</p>
        </div>

        <!-- Login card -->
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h2 class="card-title fs-5 mb-4 text-center">Sign In</h2>

            <!-- Error alert -->
            {% if error %}
            <div class="alert alert-danger py-2 small" role="alert">
              {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="POST" novalidate>
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input
                  type="text"
                  id="username"
                  name="username"
                  class="form-control"
                  placeholder="Enter your username"
                  required
                  autofocus
                />
              </div>

              <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-control"
                  placeholder="Enter your password"
                  required
                />
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary">Sign In</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Demo hint -->
        <p class="text-center text-muted small mt-3">
          Demo accounts: <strong>alice</strong> / password123 &nbsp;|&nbsp; <strong>bob</strong> / password456
        </p>

      </div>
    </div>
  </div>
</body>
</html>
